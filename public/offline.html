<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f97316" />
    <title>オフラインです | きろくま</title>
    <style>
      :root {
        color: #0f172a;
        background: #fff7ed;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
      }
      main {
        box-sizing: border-box;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }
      section {
        width: min(100%, 390px);
        border-radius: 28px;
        background: #ffffff;
        padding: 28px 22px;
        box-shadow: 0 12px 30px rgb(15 23 42 / 0.08);
      }
      .eyebrow {
        margin: 0;
        color: #ea580c;
        font-size: 14px;
        font-weight: 700;
      }
      h1 {
        margin: 10px 0 0;
        font-size: 28px;
        line-height: 1.25;
      }
      p {
        margin: 14px 0 0;
        color: #475569;
        font-size: 15px;
        line-height: 1.8;
      }
      a {
        display: block;
        margin-top: 22px;
        border-radius: 18px;
        background: #f97316;
        color: #ffffff;
        padding: 16px;
        text-align: center;
        font-weight: 800;
        text-decoration: none;
      }
      .note {
        border-radius: 18px;
        background: #ffedd5;
        padding: 14px;
        color: #9a3412;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <section aria-labelledby="offline-title">
        <p class="eyebrow">きろくま</p>
        <h1 id="offline-title">いまはオフラインです</h1>
        <p>通信が戻ったら、もう一度ホームを開いてください。保存済みの画面やデータは、ブラウザに残っている範囲で利用できます。</p>
        <p class="note">入力途中の内容がある場合は、この画面を閉じる前に通信状態を確認してね。</p>
        <a href="/">ホームを開きなおす</a>
      </section>
    </main>
  </body>
</html>
